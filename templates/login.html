<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secure Access Login</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      min-height:100%;
      background:#000;
      font-family:'Inter',sans-serif;
      color:white;
      overflow-x:hidden;
    }

    body{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;

      background:
      radial-gradient(circle at 20% 30%, rgba(0,255,170,0.12), transparent 30%),
      radial-gradient(circle at 70% 50%, rgba(0,255,170,0.08), transparent 40%);

      z-index:0;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;

      background-image:
      linear-gradient(rgba(0,255,170,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,170,0.07) 1px, transparent 1px);

      background-size:45px 45px;
      opacity:0.5;
      z-index:0;
    }

    .container{
      width:100%;
      min-height:100vh;

      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:40px 80px;
      position:relative;
      z-index:2;
      gap:60px;
    }

    .login-card{
      width:100%;
      max-width:430px;

      background:rgba(0,0,0,0.72);
      backdrop-filter:blur(14px);

      border:1.5px solid rgba(0,255,170,0.4);
      border-radius:24px;

      padding:24px 28px;

      box-shadow:
      0 0 10px rgba(0,255,170,0.25),
      0 0 35px rgba(0,255,170,0.08);
    }

    .logo{
      text-align:center;
      margin-bottom:20px;
    }

    .shield{
      width:58px;
      height:58px;
      border:2px solid #00ffb3;
      border-radius:18px;
      transform:rotate(45deg);
      margin:0 auto 15px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .shield span{
      transform:rotate(-45deg);
      color:#00ffb3;
      font-family:'Orbitron';
      font-size:13px;
      font-weight:700;
    }

    .group{
      color:#00ffb3;
      font-family:'Orbitron';
      font-size:13px;
      letter-spacing:3px;
      margin-bottom:10px;
    }

    h1{
      font-family:'Orbitron';
      font-size:24px;
      margin-bottom:8px;
    }

    .subtitle{
      color:#00ffb3;
      font-size:12px;
      margin-bottom:12px;
    }

    .small-line{
      width:50px;
      height:3px;
      background:#00ffb3;
      margin:0 auto 15px;
      border-radius:999px;
    }

    .status{
      width:100%;
      padding:12px;
      border-radius:10px;
      margin-bottom:18px;
      text-align:center;
      font-size:12px;

      border:1px solid rgba(255,77,77,0.25);
      background:rgba(255,77,77,0.08);
      color:#ff6666;
    }

    .input-group{
      margin-bottom:14px;
    }

    .input-group label{
      display:block;
      margin-bottom:7px;
      color:#00ffb3;
      font-family:'Orbitron';
      font-size:11px;
    }

    .input-box{
      width:100%;
      height:50px;
      display:flex;
      align-items:center;
      gap:12px;
      padding:0 15px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.03);
    }

    .input-box:focus-within{
      border-color:#00ffb3;
    }

    .input-box input{
      flex:1;
      background:transparent;
      border:none;
      outline:none;
      color:white;
    }

    .icon{
      color:#00ffb3;
    }

    .eye{
      cursor:pointer;
    }

    .options{
      display:flex;
      justify-content:space-between;
      margin:10px 0 18px;
      font-size:12px;
    }

    .remember input{
      accent-color:#00ffb3;
    }

    .forgot{
      color:#00ffb3;
      text-decoration:none;
    }

    .btn{
      width:100%;
      height:50px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,#00d97e,#00ffb3);
      font-family:'Orbitron';
      font-weight:700;
      cursor:pointer;
    }

    .side-text{
      flex:1;
      text-align:center;
      font-family:'Orbitron';
      font-size:52px;
      color:#00ffb3;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="login-card">

      <div class="logo">
        <div class="shield">
          <span>CCSB</span>
        </div>

        <div class="group">GROUP 1</div>

        <h1>SECURE ACCESS LOGIN</h1>
        <div class="subtitle">Authentication Required</div>
        <div class="small-line"></div>
      </div>

      <!-- FLASH MESSAGE -->
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for message in messages %}
            <div class="status">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <!-- LOGIN FORM (FIXED) -->
      <form method="POST" action="/login">

        <div class="input-group">
          <label>USERNAME</label>
          <div class="input-box">
            <i class="fa-solid fa-user icon"></i>
            <input type="text" name="username" placeholder="Enter username" required>
          </div>
        </div>

        <div class="input-group">
          <label>PASSWORD</label>
          <div class="input-box">
            <i class="fa-solid fa-lock icon"></i>
            <input type="password" name="password" id="password" placeholder="Enter password" required>
            <i class="fa-regular fa-eye icon eye" id="togglePassword"></i>
          </div>
        </div>

        <div class="options">
          <label class="remember">
            <input type="checkbox"> Remember me
          </label>

          <a href="#" class="forgot">Forgot Password?</a>
        </div>

        <button type="submit" class="btn">
          INITIALIZE ACCESS
        </button>

      </form>

    </div>

    <div class="side-text">
      AUTHORIZED PERSONNEL ONLY
    </div>

  </div>

  <script>
    const password = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");

    togglePassword.addEventListener("click", () => {
      if(password.type === "password"){
        password.type = "text";
        togglePassword.classList.replace("fa-eye","fa-eye-slash");
      } else {
        password.type = "password";
        togglePassword.classList.replace("fa-eye-slash","fa-eye");
      }
    });
  </script>

</body>
</html>
