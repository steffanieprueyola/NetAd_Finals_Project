<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secure Access Login</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      font-family:'Inter',sans-serif;
      color:white;
    }

    body{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* BACKGROUND */

    body::before{
      content:"";
      position:absolute;
      inset:0;

      background:
      radial-gradient(circle at 20% 30%, rgba(0,255,170,0.12), transparent 30%),
      radial-gradient(circle at 70% 50%, rgba(0,255,170,0.08), transparent 40%);

      z-index:0;
    }

    /* GRID EFFECT */

    body::after{
      content:"";
      position:absolute;
      inset:0;

      background-image:

      linear-gradient(rgba(0,255,170,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,170,0.07) 1px, transparent 1px),

      radial-gradient(circle at top left, rgba(0,255,170,0.12), transparent 35%),
      radial-gradient(circle at bottom right, rgba(0,255,170,0.08), transparent 35%);

      background-size:
      45px 45px,
      45px 45px,
      auto,
      auto;

      opacity:0.5;
      z-index:0;
    }

    /* MAIN */

    .container{
      width:100%;
      height:100vh;

      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:40px 80px;

      position:relative;
      z-index:2;
    }

    /* LOGIN CARD */

    .login-card{

      /* WIDER */
      width:430px;

      background:rgba(0,0,0,0.72);
      backdrop-filter:blur(14px);

      border:1.5px solid rgba(0,255,170,0.4);
      border-radius:24px;

      /* SHORTER HEIGHT */
      padding:22px 28px;

      box-shadow:
      0 0 10px rgba(0,255,170,0.25),
      0 0 35px rgba(0,255,170,0.08);

      position:relative;
      overflow:hidden;
    }

    .login-card::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:24px;
      padding:1px;

      background:linear-gradient(
      135deg,
      rgba(0,255,170,0.45),
      transparent,
      rgba(0,255,170,0.3));

      -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);

      -webkit-mask-composite:xor;
      pointer-events:none;
    }

    /* LOGO */

    .logo{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      margin-bottom:20px;
    }

    .shield{
      width:58px;
      height:58px;

      border:2px solid #00ffb3;
      border-radius:18px;

      transform:rotate(45deg);

      display:flex;
      align-items:center;
      justify-content:center;

      margin-bottom:15px;

      box-shadow:0 0 15px rgba(0,255,170,0.45);
    }

    .shield span{
      transform:rotate(-45deg);

      color:#00ffb3;

      font-family:'Orbitron',sans-serif;
      font-size:13px;
      font-weight:700;
      letter-spacing:1px;
    }
    .logo-text{
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .group{
      color:#00ffb3;
      font-family:'Orbitron',sans-serif;
      font-size:13px;
      letter-spacing:3px;
      margin-bottom:10px;
    }

    .divider{
      width:90px;
      height:2px;
      background:rgba(0,255,170,0.3);
      position:relative;
      margin-bottom:18px;
    }

    .divider::after{
      content:"";
      width:8px;
      height:8px;
      border-radius:50%;
      background:#00ffb3;

      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);

      box-shadow:0 0 8px #00ffb3;
    }

    h1{
      font-family:'Orbitron',sans-serif;
      font-size:24px;
      letter-spacing:1.5px;
      margin-bottom:8px;
      line-height:1.3;
    }

    .subtitle{
      color:#00ffb3;
      font-size:12px;
      letter-spacing:1.5px;
      margin-bottom:12px;
    }

    .small-line{
      width:50px;
      height:3px;
      border-radius:999px;
      background:#00ffb3;
      box-shadow:0 0 8px #00ffb3;
    }

    /* INPUTS */

    .input-group{
      margin-bottom:14px;
    }

    .input-group label{
      display:block;
      margin-bottom:7px;

      color:#00ffb3;
      font-family:'Orbitron',sans-serif;
      font-size:11px;
      letter-spacing:2px;
    }

    .input-box{
      width:100%;
      height:50px;

      display:flex;
      align-items:center;
      gap:12px;

      padding:0 15px;

      border-radius:12px;
      border:1px solid rgba(255,255,255,0.12);

      background:rgba(255,255,255,0.03);

      transition:0.3s;
    }

    .input-box:focus-within{
      border-color:#00ffb3;
      box-shadow:0 0 14px rgba(0,255,170,0.22);
    }

    .input-box input{
      flex:1;
      background:transparent;
      border:none;
      outline:none;

      color:white;
      font-size:14px;
    }

    .input-box input::placeholder{
      color:rgba(255,255,255,0.4);
    }

    .icon{
      color:#00ffb3;
      font-size:15px;
      width:18px;
      text-align:center;
    }

    .eye{
      cursor:pointer;
    }

    /* OPTIONS */

    .options{
      display:flex;
      align-items:center;
      justify-content:space-between;

      margin:2px 0 18px;
      gap:15px;
    }

    .remember{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:12px;
    }

    .remember input{
      width:14px;
      height:14px;
      accent-color:#00ffb3;
    }

    .forgot{
      color:#00ffb3;
      text-decoration:none;
      font-size:12px;
    }

    .forgot:hover{
      text-decoration:underline;
    }

    /* BUTTON */

    .btn{
      width:100%;
      height:50px;

      border:none;
      border-radius:12px;

      background:linear-gradient(135deg,#00d97e,#00ffb3);

      color:white;

      font-family:'Orbitron',sans-serif;
      font-size:14px;
      letter-spacing:1.5px;

      cursor:pointer;

      display:flex;
      align-items:center;
      justify-content:center;

      transition:0.3s;

      box-shadow:0 0 20px rgba(0,255,170,0.22);
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 0 28px rgba(0,255,170,0.4);
    }

    /* STATUS */

    .status{
      margin-top:12px;
      text-align:center;
      min-height:16px;
      font-size:11px;
      letter-spacing:1px;
    }

    /* RIGHT TEXT */

    .side-text{
      flex:1;

      display:flex;
      align-items:center;
      justify-content:center;

      text-align:center;

      font-family:'Orbitron',sans-serif;
      font-size:52px;
      letter-spacing:5px;

      color:#00ffb3;

      text-shadow:0 0 18px rgba(0,255,170,0.7);

      padding-left:50px;
    }

    /* TABLET */

    @media(max-width:1100px){

      html,body{
        overflow:auto;
      }

      .container{
        flex-direction:column;
        justify-content:center;
        gap:40px;
        padding:30px 20px;
      }

      .side-text{
        font-size:28px;
        padding-left:0;
      }

    }

    /* MOBILE */

    @media(max-width:600px){

      .login-card{
        width:100%;
        max-width:430px;
      }

      .side-text{
        font-size:20px;
        letter-spacing:2px;
      }

      .options{
        flex-direction:column;
        align-items:flex-start;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <!-- LOGIN -->

    <div class="login-card">

      <div class="logo">

        <div class="shield">
         <span class="logo-text">CCSB</span>
        </div>

        <div class="group">GROUP 1</div>

        <div class="divider"></div>

        <h1>SECURE ACCESS LOGIN</h1>

        <div class="subtitle">
          Authentication Required
        </div>

        <div class="small-line"></div>

      </div>

      <!-- FORM -->

      <form id="loginForm">

        <div class="input-group">

          <label>OPERATOR ID</label>

          <div class="input-box">

            <i class="fa-solid fa-id-badge icon"></i>

            <input
              type="text"
              id="operatorId"
              placeholder="Enter operator ID"
              required
            >

          </div>

        </div>

        <div class="input-group">

          <label>ACCESS KEY</label>

          <div class="input-box">

            <i class="fa-solid fa-key icon"></i>

            <input
              type="password"
              id="password"
              placeholder="Enter access key"
              required
            >

            <i class="fa-regular fa-eye icon eye" id="togglePassword"></i>

          </div>

        </div>

        <div class="options">

          <label class="remember">
            <input type="checkbox">
            Remember me
          </label>

          <a href="#" class="forgot">
            Forgot Password?
          </a>

        </div>

        <button type="submit" class="btn">
          INITIALIZE ACCESS
        </button>

        <div class="status" id="status"></div>

      </form>

    </div>

    <!-- RIGHT TEXT -->

    <div class="side-text">
      AUTHORIZED PERSONNEL ONLY
    </div>

  </div>

  <script>

    const loginForm = document.getElementById("loginForm");
    const operatorId = document.getElementById("operatorId");
    const password = document.getElementById("password");
    const statusText = document.getElementById("status");
    const togglePassword = document.getElementById("togglePassword");

    // SHOW / HIDE PASSWORD

    togglePassword.addEventListener("click", () => {

      if(password.type === "password"){

        password.type = "text";
        togglePassword.classList.remove("fa-eye");
        togglePassword.classList.add("fa-eye-slash");

      } else {

        password.type = "password";
        togglePassword.classList.remove("fa-eye-slash");
        togglePassword.classList.add("fa-eye");

      }

    });

    // LOGIN

    loginForm.addEventListener("submit", (e) => {

      e.preventDefault();

      const user = operatorId.value.trim();
      const pass = password.value.trim();

      if(user === "admin" && pass === "1234"){

        statusText.textContent = "ACCESS GRANTED";
        statusText.style.color = "#00ffb3";

      } else {

        statusText.textContent = "INVALID OPERATOR ID OR ACCESS KEY";
        statusText.style.color = "#ff4d4d";

      }

    });

  </script>

</body>
</html>
