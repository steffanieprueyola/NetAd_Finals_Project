<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
        rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
    />

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <title>Security Dashboard</title>

    <style>
        body {
            background-color: #111;
            color: white;
        }

        .camera-feed {
            width: 100%;
            border: 3px solid #444;
            border-radius: 10px;
        }

        .log-container {
            background: #1b1b1b;
            height: 80vh;
            overflow-y: auto;
            border-radius: 10px;
            padding: 15px;
            border: 2px solid #333;
        }

        .log-entry {
            padding: 8px;
            margin-bottom: 8px;
            border-left: 5px solid #17a2b8;
            background: #222;
            font-size: 14px;
        }

        .log-time {
            color: #aaa;
            font-size: 12px;
        }

        .status-card {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border: 2px solid #333;
        }

        h3 {
            margin-bottom: 20px;
        }
        
        .log-entry.warning {
        border-left-color: orange;
        }
        .log-entry.success {
        border-left-color: limegreen;
        }
        
        .log-entry.danger {
        border-left-color: red;
        }
        
        .log-entry.info {
        border-left-color: #17a2b8;
        }
    </style>
</head>

<body>

<div class="container-fluid mt-3">

    <div class="row">

        <!-- CAMERA -->
        <div class="col-lg-8">
            <h3>Live IP Camera Feed</h3>

            <img
                src="{{ url_for('video_feed', id='0') }}"
                class="camera-feed"
                alt="Live Camera Feed"
            />

            <div class="status-card">
                <h5>System Status</h5>
                <p>Camera Status: <span class="text-success">ONLINE</span></p>
                <p>Detection Engine: <span class="text-success">RUNNING</span></p>
            </div>
        </div>

        <!-- LIVE LOGS -->
        <div class="col-lg-4">
            <h3>Live Security Logs</h3>

            <div class="log-container" id="logs">

            </div>
        </div>

    </div>

</div>

<script>

    const socket = io();

    socket.on('new_log', function(data) {

        const logs = document.getElementById("logs");

        const logEntry = document.createElement("div");
        logEntry.classList.add("log-entry", data.type || "info");
        
        logEntry.innerHTML = `
            <div>${data.message}</div>
            <div class="log-time">${data.time}</div>
        `;

        logs.prepend(logEntry);

    });

</script>

</body>
</html>
